id: wio-tracker-l1
type: board
version: 0.1.0
status: official
license: MIT
description: Seeed Wio Tracker L1 (nRF52840 + SX1262, SH1106 OLED, GPS)
maintainers:
  - tree@tree.fail

compatibility:
  platform: ">=0.1 <0.2"
  board_api: "^0.1"

provides:
  - radio
  - display
  - battery
  - gps

board:
  architecture: nrf52840
  framework: arduino
  platformio:
    board: seeed-wio-tracker-l1
    platform: nordicnrf52
    framework: arduino
    base_env: nrf52
    ldscript: boards/nrf52840_s140_v7_extrafs.ld
    max_size: 708608
    support_files:
      - pio-board/seeed-wio-tracker-l1.json
      - pio-board/nrf52840_s140_v7.ld
      - pio-board/nrf52840_s140_v7_extrafs.ld
    variant_files:
      - variant/variant.h
      - variant/variant.cpp
    platform_packages:
      - framework-arduinoadafruitnrf52 @ https://github.com/meshcore-dev/Adafruit_nRF52_Arduino#d541301
  capabilities:
    radio: true
    display: true
    battery: true
    gps: true
    bluetooth: true
    usb: true
    wifi: false
    deep_sleep: true
  limits:
    max_tx_power_dbm: 22
    ram_budget: 235520   # from board json maximum_ram_size
  display:
    class: SH1106Display
    header: drivers/display/sh1106/SH1106Display.h
    sources:
      - +<drivers/display/sh1106/*.cpp>

build:
  includes:
    - platform/nrf52
  defines:
    WIO_TRACKER_L1: "1"
    USE_SX1262: "1"
    RADIO_CLASS: CustomSX1262
    WRAPPER_CLASS: CustomSX1262Wrapper
    SX126X_CURRENT_LIMIT: "140"
    SX126X_RX_BOOSTED_GAIN: "1"
    DISPLAY_ADDRESS: "0x3D"
    QSPIFLASH: "1"
    # COREFW_ENABLE_QSPI_STORE (contacts/channels on external QSPI, where stock
    # MeshCore keeps them) is DISABLED: every mount attempt — via Adafruit_SPIFlash
    # AND via raw nrfx_qspi with chip-wake — power-cycles the chip before any RAM
    # or flash guard can commit (bootloader ends up in DFU/blinking). Needs SWD/
    # hardware debugging to root-cause. Code is complete in NRF52QSPIFileSystem.h /
    # NRF52FileStore.h; flip this back on once the brownout is understood.
    # COREFW_ENABLE_QSPI_STORE: "1"
    PIN_OLED_RESET: "-1"
    GPS_BAUD_RATE: "9600"
    LORA_TX_POWER: "22"
    PIN_BUZZER: "12"   # on-board piezo; the shared nRF52 main wires a buzzer only when defined
  src_filter: []
  lib_deps:
    - adafruit/Adafruit SH110X @ ^2.1.13
    - adafruit/Adafruit GFX Library @ ^1.12.1
    - adafruit/Adafruit SPIFlash @ ^5.1.1

codegen:
  class: WioTrackerL1Board
  header: corefw/boards/WioTrackerL1Board.h
  var: board
  register: registerBoard
