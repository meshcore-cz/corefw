# An example external, community-maintained power policy. It lives outside the
# platform repo and is loaded via `external_components` in a profile:
#
#   external_components:
#     - source: ./examples/external-power-policy
#       components: [adaptive-solar]
#
#   policies:
#     power:
#       type: adaptive-solar
#       low_battery: 30
#       critical_battery: 15
id: adaptive-solar
type: policy
version: 0.3.0
status: community-maintained
license: MIT
description: Adaptive solar power policy that scales duty cycle with battery state
maintainers:
  - community@example.org

compatibility:
  platform: ">=0.1 <0.2"
  policy_api: "^0.1"

conflicts:
  - simple-power

resources:
  flash: 12000
  ram_static: 1200

codegen:
  class: AdaptiveSolarPolicy
  header: adaptive_solar/AdaptiveSolarPolicy.h
  var: power_policy
  register: setPowerPolicy
  setters:
    low_battery: setLowBatteryThreshold
    critical_battery: setCriticalBatteryThreshold
