# A SenseCAP Solar Node P1 repeater — a headless, solar-powered store-and-forward
# relay. A USB companion is paired alongside it purely for admin/config (the node
# has no display), matching MeshCore's SenseCap_Solar_repeater role.
#
# Build it with:  corefw build profiles/sensecap-solar-repeater.yaml
name: sensecap-solar-repeater
platform: corefw@0.1

variables:
  region: eu868
  node_name: "CoreFW Solar Repeater"

board: sensecap-solar

modules:
  - type: repeater
    advert_name: ${node_name}
    admin_password: "changeme"
    max_neighbours: 80
  - type: companion
    transport: usb

policies:
  power:
    type: simple-power
    low_battery: 30
    critical_battery: 15
    tx_power: 22

radio:
  region: ${region}
  freq: 869.525
  bandwidth: 250
  spreading_factor: 11
