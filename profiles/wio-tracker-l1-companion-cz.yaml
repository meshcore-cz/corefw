# Wio Tracker L1 companion with the advert-features extension — used to validate
# on-device (nrf52) that the shared platform TX helpers, the component-source
# copy, and the custom-var command hook all link in a real build.
name: wio-tracker-l1-companion-cz
platform: corefw@0.1
board: wio-tracker-l1

modules:
  - type: companion
    transport: ble
  - type: cz-advert-features
    feat1: 0x0001
    feat2: 0x00A0
