# A Wio Tracker L1 USB companion — matches MeshCore's companion_radio_usb role.
#
# Radio and power policy come from the board defaults. Build it with:
#   corefw build profiles/wio-tracker-l1-companion-usb.yaml
name: wio-tracker-l1-companion-usb
platform: corefw@0.1
board: wio-tracker-l1

modules:
  - type: companion
    transport: usb
