# A Heltec WiFi LoRa 32 V3 BLE companion — pairs with the MeshCore phone app.
#
# Radio (eu868/869.525/250/SF11) and the power policy come from the board's
# defaults; add a radio:/policies: block here to override them. Build it with:
#   corefw build profiles/heltec-v3-companion-ble.yaml
name: heltec-v3-companion-ble
platform: corefw@0.1
board: heltec-v3

modules:
  - type: companion
    transport: ble
