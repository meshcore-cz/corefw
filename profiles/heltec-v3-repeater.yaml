# A solar-friendly Heltec V3 repeater, with a USB companion alongside for admin.
#
# Radio and power policy come from the board defaults; the repeater's neighbour
# table size and advert interval come from the module's own defaults. Build with:
#   corefw build profiles/heltec-v3-repeater.yaml
name: heltec-v3-repeater
platform: corefw@0.1
board: heltec-v3

modules:
  - type: repeater
    advert_name: "CoreFW Repeater CZ"
    admin_password: "changeme"
  - type: companion
    transport: usb
