# A solar-friendly Heltec V3 repeater.
#
# Build it with:  corefw build profiles/heltec-v3-repeater.yaml
name: heltec-v3-repeater
platform: corefw@0.1

variables:
  region: eu868
  node_name: "CoreFW Repeater CZ"

board: heltec-v3

modules:
  - type: repeater
    advert_name: ${node_name}
    admin_password: "changeme"
    max_neighbours: 80
  - type: companion
    transport: usb

policies:
  power:
    type: simple-power
    low_battery: 30
    critical_battery: 15
    tx_power: 22

radio:
  region: ${region}
  freq: 869.525
  bandwidth: 250
  spreading_factor: 11

features:
  display: true
