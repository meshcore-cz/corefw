# A Wio Tracker L1 BLE companion — pairs with the MeshCore phone app.
#
# Radio and power policy come from the board defaults. Build it with:
#   corefw build profiles/wio-tracker-l1-companion-ble.yaml
name: wio-tracker-l1-companion-ble
platform: corefw@0.1
board: wio-tracker-l1

modules:
  - type: companion
    transport: ble
